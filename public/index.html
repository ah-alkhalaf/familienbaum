<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familienstammbaum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="app">

    <!-- Sidebar Panel -->
    <aside id="panel" class="hidden">

      <!-- Header -->
      <div class="panel-header">
        <div class="panel-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="6" r="4" fill="var(--accent)"/>
            <circle cx="6" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <circle cx="22" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <line x1="14" y1="10" x2="6" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
            <line x1="14" y1="10" x2="22" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
          <span class="panel-title">Stammbaum</span>
        </div>
      </div>

      <!-- Login -->
      <div id="login">
        <p class="login-subtitle">Admin-Zugang</p>
        <div class="field">
          <label>Benutzername</label>
          <input id="username" type="text" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="field">
          <label>Passwort</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button id="btnLogin">Anmelden</button>
      </div>

      <!-- Admin Panel -->
      <div id="adminPanel" style="display:none">
        <div class="admin-greeting">Willkommen, Admin</div>

        <div class="tabs">
          <button class="tab active" data-tab="add">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Hinzufügen
          </button>
          <button class="tab" data-tab="rename">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10.5L9.5 3l1.5 1.5L3.5 12H2v-1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
            Umbenennen
          </button>
          <button class="tab" data-tab="move">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Verschieben
          </button>
          <button class="tab" data-tab="delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Löschen
          </button>
          <button class="tab" data-tab="backup">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 10v1.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Backup
          </button>
        </div>

        <!-- Hinzufügen -->
        <div class="tab-content" id="tab-add">
          <div class="field">
            <label>Name</label>
            <input id="addName" type="text" placeholder="Name eingeben" />
          </div>
          <div class="field">
            <label>Vater</label>
            <select id="addParent"></select>
          </div>
          <button id="btnAdd">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Person hinzufügen
          </button>
        </div>

        <!-- Umbenennen -->
        <div class="tab-content hidden" id="tab-rename">
          <div class="field">
            <label>Mitglied</label>
            <select id="renameTarget"></select>
          </div>
          <div class="field">
            <label>Neuer Name</label>
            <input id="renameNew" type="text" placeholder="Neuer Name" />
          </div>
          <button id="btnRename">Umbenennen</button>
        </div>

        <!-- Verschieben -->
        <div class="tab-content hidden" id="tab-move">
          <div class="field">
            <label>Mitglied</label>
            <select id="moveTarget"></select>
          </div>
          <div class="field">
            <label>Neuer Vater</label>
            <select id="moveParent"></select>
          </div>
          <button id="btnMove">Verschieben</button>
        </div>

        <!-- Löschen -->
        <div class="tab-content hidden" id="tab-delete">
          <div class="field">
            <label>Mitglied</label>
            <select id="deleteTarget"></select>
          </div>
          <button id="btnDelete" class="danger">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 3.5h10M4.5 3.5V2h4v1.5M5 5.5v4M8 5.5v4M2.5 3.5l.7 7h7.6l.7-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Löschen
          </button>
          <p class="hint">⚠ Wurzelknoten kann nicht gelöscht werden.</p>
        </div>

        <!-- Backup -->
        <div class="tab-content hidden" id="tab-backup">
          <button id="btnExport" class="secondary">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5M1.5 9.5v1.5a.5.5 0 00.5.5h8a.5.5 0 00.5-.5V9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            JSON exportieren
          </button>
          <hr class="sep" />
          <div class="field">
            <label>Backup wiederherstellen</label>
            <select id="restoreSelect"></select>
          </div>
          <button id="btnRestore" class="secondary">Wiederherstellen</button>
        </div>

        <button id="btnLogout" class="logout-btn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M5 11H2.5A.5.5 0 012 10.5v-8A.5.5 0 012.5 2H5M9 9.5l2.5-3L9 3.5M11.5 6.5H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Abmelden
        </button>
      </div>
    </aside>

    <!-- Canvas -->
    <main id="stage">
      <div class="stage-topbar">
        <div class="stage-brand">
          <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="6" r="4" fill="var(--accent)"/>
            <circle cx="6" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <circle cx="22" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <line x1="14" y1="10" x2="6" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
            <line x1="14" y1="10" x2="22" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
          <span>Familienstammbaum</span>
        </div>
        <div id="adminToggleWrapper">
          <button id="btnTogglePanel" class="toggle-btn">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="currentColor" stroke-width="1.4"/><path d="M7.5 5v3.5M7.5 10.5v.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            Admin
          </button>
        </div>
      </div>
      <svg id="svg"></svg>
    </main>

  </div>
</body>
</html>
