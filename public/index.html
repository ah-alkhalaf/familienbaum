<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شجرة العائلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="app">

    <aside id="panel" class="hidden">
      <div class="panel-header">
        <div class="panel-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="6" r="4" fill="var(--accent)"/>
            <circle cx="6" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <circle cx="22" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <line x1="14" y1="10" x2="6" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
            <line x1="14" y1="10" x2="22" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
          <span class="panel-title">شجرة العائلة</span>
        </div>
      </div>

      <div id="login">
        <p class="login-subtitle">دخول المسؤول</p>
        <div class="field">
          <label>اسم المستخدم</label>
          <input id="username" type="text" placeholder="admin" autocomplete="username"/>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <button id="btnLogin">دخول</button>
      </div>

      <div id="adminPanel" style="display:none">
        <div class="admin-greeting">مرحباً، المسؤول</div>

        <div class="tabs">
          <button class="tab active" data-tab="add">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            إضافة
          </button>
          <button class="tab" data-tab="rename">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10.5L9.5 3l1.5 1.5L3.5 12H2v-1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
            تغيير الاسم
          </button>
          <button class="tab" data-tab="move">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M8 4l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            نقل
          </button>
          <button class="tab" data-tab="delete">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.8 7.5h6.4L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            حذف
          </button>
          <button class="tab" data-tab="founder">
            💻 المؤسس
          </button>
          <button class="tab" data-tab="backup">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 10v1.5a.5.5 0 00.5.5h9a.5.5 0 00.5-.5V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            نسخ احتياطي
          </button>
        </div>

        <!-- إضافة -->
        <div class="tab-content" id="tab-add">
          <div class="field">
            <label>الاسم (أو عدة أسماء بفاصلة)</label>
            <input id="addName" type="text" placeholder="مثال: محمد، أحمد، علي" />
            <span class="hint">💡 يمكن إضافة عدة أبناء بفاصلة دفعة واحدة</span>
          </div>
          <div class="field">
            <label>الأب</label>
            <select id="addParent"></select>
          </div>
          <button id="btnAdd">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            إضافة
          </button>
        </div>

        <!-- تغيير الاسم -->
        <div class="tab-content hidden" id="tab-rename">
          <div class="field">
            <label>الشخص</label>
            <select id="renameTarget"></select>
          </div>
          <div class="field">
            <label>الاسم الجديد</label>
            <input id="renameNew" type="text" placeholder="الاسم الجديد" />
          </div>
          <button id="btnRename">تغيير الاسم</button>
        </div>

        <!-- نقل -->
        <div class="tab-content hidden" id="tab-move">
          <div class="field">
            <label>الشخص</label>
            <select id="moveTarget"></select>
          </div>
          <div class="field">
            <label>الأب الجديد</label>
            <select id="moveParent"></select>
          </div>
          <button id="btnMove">نقل</button>
        </div>

        <!-- حذف -->
        <div class="tab-content hidden" id="tab-delete">
          <div class="field">
            <label>الشخص</label>
            <select id="deleteTarget"></select>
          </div>
          <button id="btnDelete" class="danger">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 3.5h10M4.5 3.5V2h4v1.5M5 5.5v4M8 5.5v4M2.5 3.5l.7 7h7.6l.7-7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            حذف
          </button>
          <p class="hint">⚠ لا يمكن حذف العقدة الجذرية.</p>
        </div>

        <!-- المؤسس -->
        <div class="tab-content hidden" id="tab-founder">
          <p class="hint" style="margin-bottom:10px;">اختر الشخص الذي أسس هذه الصفحة — سيظهر بإطار ذهبي ورمز 💻</p>
          <div class="field">
            <label>مؤسس الصفحة</label>
            <select id="founderTarget"></select>
          </div>
          <button id="btnSetFounder">
            💻 تعيين كمؤسس
          </button>
        </div>

        <!-- نسخ احتياطي -->
        <div class="tab-content hidden" id="tab-backup">
          <button id="btnExport" class="secondary">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M4 5.5l2.5 2.5L9 5.5M1.5 9.5v1.5a.5.5 0 00.5.5h8a.5.5 0 00.5-.5V9.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            تصدير JSON
          </button>
          <hr class="sep" />
          <div class="field">
            <label>استعادة نسخة احتياطية</label>
            <select id="restoreSelect"></select>
          </div>
          <button id="btnRestore" class="secondary">استعادة</button>
        </div>

        <button id="btnLogout" class="logout-btn">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M5 11H2.5A.5.5 0 012 10.5v-8A.5.5 0 012.5 2H5M9 9.5l2.5-3L9 3.5M11.5 6.5H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          تسجيل الخروج
        </button>
      </div>
    </aside>

    <main id="stage">
      <div class="stage-topbar">
        <div class="stage-brand">
          <svg width="20" height="20" viewBox="0 0 28 28" fill="none">
            <circle cx="14" cy="6" r="4" fill="var(--accent)"/>
            <circle cx="6" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <circle cx="22" cy="20" r="3.5" fill="var(--accent-muted)"/>
            <line x1="14" y1="10" x2="6" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
            <line x1="14" y1="10" x2="22" y2="17" stroke="var(--accent)" stroke-width="1.5"/>
          </svg>
          <span>شجرة العائلة</span>
        </div>
        <!-- شريط البحث -->
        <div id="searchWrapper">
          <button id="btnSearch" class="search-icon-btn" title="بحث">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/>
              <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <div id="searchBar" class="search-bar hidden">
            <input id="searchInput" type="text" placeholder="اكتب الاسم كاملاً أو جزءاً منه..." autocomplete="off" />
            <button id="btnClearSearch" class="search-clear">✕</button>
          </div>
          <span id="searchHint" class="search-hint hidden">ابحث باسم الشخص — سيُفتح فرعه تلقائياً</span>
        </div>
        <div id="adminToggleWrapper">
          <a href="https://github.com/ah-alkhalaf/familienbaum" target="_blank" class="github-link">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M7.5 0C3.36 0 0 3.36 0 7.5c0 3.31 2.15 6.12 5.13 7.11.37.07.51-.16.51-.36v-1.27c-2.08.45-2.52-.99-2.52-.99-.34-.86-.83-1.09-.83-1.09-.68-.46.05-.45.05-.45.75.05 1.15.77 1.15.77.67 1.14 1.75.81 2.18.62.07-.48.26-.81.47-1-1.66-.19-3.4-.83-3.4-3.7 0-.82.29-1.48.77-2-.08-.19-.33-.96.07-2 0 0 .63-.2 2.06.77a7.17 7.17 0 011.88-.25c.64 0 1.28.08 1.88.25 1.43-.97 2.06-.77 2.06-.77.4 1.04.15 1.81.07 2 .48.52.77 1.18.77 2 0 2.88-1.75 3.51-3.42 3.7.27.23.51.69.51 1.39v2.06c0 .2.13.43.51.36C12.85 13.62 15 10.81 15 7.5 15 3.36 11.64 0 7.5 0z" fill="currentColor"/></svg>
            كود المصدر
          </a>
        </div>
      </div>
      <svg id="svg"></svg>
    </main>

  </div>
</body>
</html>
